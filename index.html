<!DOCTYPE html>
<html>
  <head>
    <title>Sellerie Dorée | Élégance Équestre</title>
    <meta name="description" content="Sellerie Dorée, vêtements élégants pour cavalières exigeantes.">
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>

    <div class="banner">
      <div class="container">
        <h1>Sellerie Dorée</h1>
        <h2>L'élégance au service de la cavalière</h2>
        <a href="#" class="btn-primary">Découvrir la collection</a>
      </div>
    </div>

    <div class="container">
      <div class="cards">

        <div class="card">
          <img src="images/veste.jpg" alt="Veste d'équitation">
          <h3>Veste d'Équitation</h3>
        </div>

        <div class="card">
          <img src="images/pantalon.jpg" alt="Pantalon d'équitation">
          <h3>Pantalon d'Équitation</h3>
        </div>

        <div class="card">
          <img src="images/bombe.jpg" alt="Bombe d'équitation">
          <h3>Bombe de Concours</h3>
        </div>

        <div class="card">
          <img src="images/bottes.jpg" alt="Bottes d'équitation">
          <h3>Bottes Cavalières</h3>
        </div>

      </div>
    </div>

  </body>
</html>
